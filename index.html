<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern PDF Reader</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background-color: #e2e8f0; color: #1e293b; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem; }
        .card { background: #ffffff; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); width: 100%; max-width: 700px; }
        h2 { margin-bottom: 0.5rem; color: #0f172a; font-size: 1.8rem; text-align: center; }
        p.subtitle { text-align: center; color: #64748b; margin-bottom: 2rem; font-size: 0.95rem; }

        .drop-zone { border: 2px dashed #cbd5e1; border-radius: 12px; padding: 3rem 2rem; text-align: center; background-color: #f8fafc; cursor: pointer; transition: all 0.2s ease; margin-bottom: 1.5rem; }
        .drop-zone:hover, .drop-zone.dragover { border-color: #3b82f6; background-color: #eff6ff; }
        .drop-zone p { margin-top: 1rem; color: #475569; font-weight: 500; }
        .drop-zone .icon { font-size: 3rem; color: #94a3b8; }
        #pdfFile { display: none; }

        .btn-submit { width: 100%; background-color: #3b82f6; color: white; border: none; padding: 1rem; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: background-color 0.2s; }
        .btn-submit:hover { background-color: #2563eb; }
        .btn-submit:disabled { background-color: #94a3b8; cursor: not-allowed; }

        .loader-container { display: none; text-align: center; margin: 2rem 0; }
        .spinner { border: 4px solid rgba(59, 130, 246, 0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #3b82f6; animation: spin 1s linear infinite; margin: 0 auto 1rem auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #output-container { display: none; margin-top: 2rem; }
        .output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; font-weight: 600; color: #334155; }
        #output { white-space: pre-wrap; background: #f1f5f9; padding: 1.5rem; border-radius: 8px; min-height: 200px; max-height: 500px; overflow-y: auto; border: 1px solid #e2e8f0; font-size: 0.95rem; line-height: 1.6; color: #1e293b; }

        .btn-speak { background-color: #10b981; color: white; border: none; padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; display: none; transition: background-color 0.2s; }
        .btn-speak:hover { background-color: #059669; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Document Reader</h2>
        <p class="subtitle">Extract and instantly listen to your PDF files</p>

        <form id="uploadForm">
            <div class="drop-zone" id="dropZone">
                <div class="icon">📄</div>
                <p id="dropZoneText">Drag & Drop your PDF here or click to browse</p>
                <input type="file" id="pdfFile" accept="application/pdf" required>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">Extract Text</button>
        </form>

        <div class="loader-container" id="loader">
            <div class="spinner"></div>
            <p style="color: #64748b;">Processing your document...</p>
        </div>

        <div id="output-container">
            <div class="output-header">
                <span>Extracted Text</span>
                <button id="speakBtn" class="btn-speak">🔊 Read Aloud</button>
            </div>
            <div id="output"></div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('pdfFile');
        const dropZoneText = document.getElementById('dropZoneText');
        const uploadForm = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const outputContainer = document.getElementById('output-container');
        const outputDiv = document.getElementById('output');
        const speakBtn = document.getElementById('speakBtn');

        // --- Drag and Drop Logic ---
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) { fileInput.files = e.dataTransfer.files; updateFileName(); }
        });
        fileInput.addEventListener('change', updateFileName);

        function updateFileName() {
            if (fileInput.files.length > 0) {
                dropZoneText.innerHTML = `<strong>Selected:</strong> ${fileInput.files[0].name}`;
                dropZone.style.borderColor = '#10b981';
                dropZone.style.backgroundColor = '#ecfdf5';
            }
        }

        // --- Handle PDF Upload ---
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = fileInput.files[0];
            if (!file) return;

            // UI State: Loading
            submitBtn.disabled = true;
            submitBtn.textContent = "Extracting...";
            loader.style.display = 'block';
            outputContainer.style.display = 'none';
            speakBtn.style.display = 'none';

            // Stop any ongoing speech
            window.speechSynthesis.cancel();
            isSpeaking = false;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                const data = await response.json();

                outputContainer.style.display = 'block';
                if (response.ok) {
                    outputDiv.textContent = data.text;
                    speakBtn.style.display = 'block'; // Show Read Aloud button
                } else {
                    outputDiv.textContent = `Error: ${data.error}`;
                }
            } catch (err) {
                outputContainer.style.display = 'block';
                outputDiv.textContent = `Server Error: ${err.message}. Make sure the Flask server is running.`;
            } finally {
                // UI State: Reset
                submitBtn.disabled = false;
                submitBtn.textContent = "Extract Text";
                loader.style.display = 'none';
            }
        });

        // --- Instant Web Speech API ---
        let isSpeaking = false;

        speakBtn.addEventListener('click', () => {
            const textToRead = outputDiv.textContent;
            if (!textToRead) return;

            // If already reading, stop it
            if (isSpeaking) {
                window.speechSynthesis.cancel();
                speakBtn.innerHTML = "🔊 Read Aloud";
                speakBtn.style.backgroundColor = "#10b981"; // Green
                isSpeaking = false;
                return;
            }

            // Start new speech request
            const utterance = new SpeechSynthesisUtterance(textToRead);

            utterance.onstart = () => {
                isSpeaking = true;
                speakBtn.innerHTML = "⏹️ Stop Reading";
                speakBtn.style.backgroundColor = "#ef4444"; // Red
            };

            utterance.onend = () => {
                isSpeaking = false;
                speakBtn.innerHTML = "🔊 Read Aloud";
                speakBtn.style.backgroundColor = "#10b981"; // Green
            };

            utterance.onerror = () => {
                isSpeaking = false;
                speakBtn.innerHTML = "🔊 Read Aloud";
                speakBtn.style.backgroundColor = "#10b981"; // Green
            };

            window.speechSynthesis.speak(utterance);
        });
    </script>
</body>
</html>
